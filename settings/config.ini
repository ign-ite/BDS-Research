[drl]
#reinforce or dqn or qr_dqn or rb_dqn or c51 or ppo or iqn
root=/Users/eidovis/Documents/Varun/BDS-Research-main
algo=rb_dqn
#filename of jobtrace
workload=jobs.csv
#priority of each objective: [0,1]
#1= optimizing cost, 0 = optimizing time, any value in-between: multi-objective
beta=0.2
#number of iterations
iteration=4000
#fixed episodic reward
fixed_episodic_reward=10000
epsilon=.001
#1e-3
learning_rate=0.001
#discount factor
gamma=0.9
#percentage increase of job duration if job type is not matched with placement strategy
placement_penalty=30
pp_apply=true

[reward]
use_dirichlet_weights=True

[pricing]
enable_stochastic_pricing=True
price_variance=0.05

[scheduler]
job_batch_size=4

[agent]
use_recurrent_policy=True

[workload]
# synthetic | google | alibaba
trace_type=synthetic
